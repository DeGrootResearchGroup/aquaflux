name: CI

# The always-on gates (lint + the fast test tiers) run on every pull request and
# every push to main. The memory-heavy tiers (slow, validation) run on push to
# main and, on a PR, opt-in via the `full-ci` label -- they are a visible signal,
# not a required check.
on:
  pull_request:
    # `labeled` is added so applying the `full-ci` label to an open PR triggers the
    # slow + validation tiers immediately, without needing a fresh push. The
    # always-on jobs skip the bare `labeled` action -- they already ran on the
    # latest commit.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

# Concurrency, by event:
#  - a PR `labeled` event gets its OWN group (`fullci-<ref>`), separate from the
#    fast gate, so applying `full-ci` spins up the slow+validation run without
#    cancelling (or being starved by) the required fast gate.
#  - a push to main is keyed on the immutable commit SHA and never cancelled, so a
#    rapid second merge cannot cancel the first merge's run.
#  - every other PR event is keyed on the ref and cancels superseded runs.
concurrency:
  group: >-
    ${{ github.workflow }}-${{
      (github.event_name == 'pull_request' && github.event.action == 'labeled')
      && format('fullci-{0}', github.ref)
      || (github.event_name == 'push' && github.sha)
      || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

# Pin XLA/BLAS to a single thread per process so pytest-xdist workers do not
# oversubscribe the runner's CPUs -- each JAX process otherwise grabs every core,
# and N workers x M cores thrashes. With this, `-n auto` scales cleanly.
env:
  OMP_NUM_THREADS: "1"
  XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"

jobs:
  # ---- Lint gate: ruff + codespell (always-on) --------------------------------
  # Static checks only -- no JAX import, no compile -- so it is cheap. This is the
  # same set of commands the local pre-push hook runs (.githooks/pre-push).
  lint:
    name: ruff
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          # Lint results do not depend on the interpreter -- ruff reads its own
          # `target-version` from pyproject.toml. This version only governs the
          # install below.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Installs ruff and codespell at the versions pinned by the `lint` extra,
      # so the gate cannot move under us when a new release is published.
      - name: Install the pinned linters
        run: pip install -e ".[lint]"

      - name: ruff check
        run: ruff check aquaflux tests

      # Report later failures even when an earlier step already failed -- one red
      # run should show every problem to fix, not just the first.
      - name: ruff format --check
        if: ${{ !cancelled() }}
        run: ruff format --check aquaflux tests

      # Canadian spelling gate (custom dictionary; config in pyproject.toml).
      - name: codespell
        if: ${{ !cancelled() }}
        run: codespell aquaflux tests

  # ---- Fast unit tests (always-on) --------------------------------------------
  # Most unit tests are cheap and homogeneous (peak ~5 GB in one process), so they
  # run unsharded across xdist workers (`-n auto`). The wall-clock driver, though, is
  # the handful of distributed (`shard_map`) tests, each of which spawns a fresh
  # interpreter to set the simulated device count before JAX starts and then compiles
  # a sharded program -- that fixed cost, not the cheap tests, sets the budget below.
  # Two interpreters, since a unit-level regression can be version-specific.
  unit:
    name: unit tests (py${{ matrix.python-version }})
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run unit tests
        # `not slow and not validation`: a few unit tests carry those markers and
        # belong to the heavier tiers below. --timeout names a deadlocked test
        # instead of hanging; --max-worker-restart=0 fails the run on a crashed
        # (e.g. OOM-killed) worker rather than silently retrying.
        run: >-
          pytest tests/unit -m "not slow and not validation" -q -n auto
          --timeout=300 --timeout-method=thread --max-worker-restart=0

  # ---- Fast integration tests (always-on, sharded) ----------------------------
  # The differentiable flow-solve integration tests each build and adjoint a
  # coupled Newton solve; run serially in one process their accumulated XLA
  # compilation cache + live JAX buffers reach ~15 GB (at the 16 GB hosted-runner
  # ceiling). They are homogeneous, so pytest-split's even-by-count partition
  # balances memory as well as time: each of the 6 shards runs ~1/6 of the set in
  # a fresh process (peak a few GB), and `-n 1` keeps a shard from holding several
  # heavy solves at once. The per-shard jobs are not the required check -- the
  # `fast-gate` aggregator below is.
  integration:
    name: integration tests (py${{ matrix.python-version }} shard ${{ matrix.group }}/6)
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        group: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run integration tests shard
        run: >-
          pytest tests/integration -m "not slow and not validation" -q -n 1
          --splits 6 --group ${{ matrix.group }}
          --durations=15 --timeout=900 --timeout-method=thread --max-worker-restart=0

  # ---- Fast-gate aggregator: the single required status check ------------------
  # Sharding renames the per-shard jobs (and their count may change), so make ONE
  # stable job the required check. It passes iff the lint, unit and integration
  # matrices all passed (or were skipped -- a bare `labeled` event skips them,
  # which must not block). Update branch protection to require `fast gate`.
  fast-gate:
    name: fast gate
    needs: [lint, unit, integration]
    if: always() && github.event.action != 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Require the always-on gates to pass
        run: |
          for job in lint unit integration; do
            case "$job" in
              lint) r="${{ needs.lint.result }}" ;;
              unit) r="${{ needs.unit.result }}" ;;
              integration) r="${{ needs.integration.result }}" ;;
            esac
            echo "$job: $r"
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::$job did not pass (result: $r)"
              exit 1
            fi
          done

  # ---- Slow suite: merge-to-main + opt-in on a PR -----------------------------
  # The multi-minute solves marked `slow`. Runs on every push to main so a
  # regression the fast gate cannot catch surfaces within minutes of landing, and
  # on a PR carrying the `full-ci` label (the opt-in pre-merge check). Sharded
  # `-n 1` for the same accumulated-memory reason as the integration tier.
  slow:
    name: slow suite (shard ${{ matrix.group }}/2)
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          # 3.12 only: the heavy tiers run on a single interpreter as a cost
          # saving; the fast gate already exercises 3.11 + 3.12.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run slow suite shard
        # `slow and not validation` keeps the tiers disjoint (a test marked both
        # runs in the validation job, not here).
        run: >-
          pytest -m "slow and not validation" -q -n 1
          --splits 2 --group ${{ matrix.group }}
          --durations=15 --timeout=900 --timeout-method=thread --max-worker-restart=0

  # ---- Validation suite (against analytical/published solutions) --------------
  # The heaviest tests in the repo: run serially in one process they reach ~16 GB
  # (the runner ceiling). Split across 5 fresh processes, each shard's ~3 tests
  # peak ~2 GB. Same triggers as the slow tier.
  validation:
    name: validation suite (shard ${{ matrix.group }}/5)
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run validation suite shard
        run: >-
          pytest -m "validation" -q -n 1
          --splits 5 --group ${{ matrix.group }}
          --durations=15 --timeout=900 --timeout-method=thread --max-worker-restart=0
